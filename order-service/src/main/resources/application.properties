server.port=8082

spring.application.name=order-service
spring.config.import=optional:configserver:http://localhost:8888

spring.datasource.url=jdbc:h2:mem:orderdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true

# ============================================================
# Section 3 - Exercise: Service Discovery
# ============================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
# ============================================================

# ============================================================
# Section 4 - Note: spring.config.import is already set above
#   with the "optional:" prefix so the app starts without Config Server.
#   In Section 4, you'll configure Config Server and see it in action.
# ============================================================

# ============================================================
# Section 5 - Resilience is built into Spring Framework 7!
#   No external dependencies needed. Uses @Retryable annotation.
#   See: https://docs.spring.io/spring-framework/reference/core/resilience.html
# ============================================================

